spark.master                     spark://spark-master:7077
spark.app.name                   bronze-youtube-comments
spark.sql.shuffle.partitions     4
spark.streaming.stopGracefullyOnShutdown true
spark.jars.ivy                   /tmp/.ivy2
spark.local.dir                  /tmp/spark-local
spark.cores.max                  2
spark.executor.cores             1
spark.executor.memory            512m
spark.sql.catalogImplementation  hive
spark.hadoop.hive.metastore.uris thrift://host.docker.internal:9083
spark.sql.warehouse.dir          hdfs://namenode:8020/user/hive/warehouse
spark.jars.packages              io.delta:delta-core_2.12:2.3.0
spark.sql.extensions             io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog  org.apache.spark.sql.delta.catalog.DeltaCatalog
spark.databricks.delta.schema.autoMerge.enabled true
