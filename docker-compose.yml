services:
  kafka:
    image: bitnami/kafka:3.5.1
    container_name: nhom19-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "19092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nhom19-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: demo
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: nhom19-namenode
    environment:
      CLUSTER_NAME: demo
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
    ports:
      - "9871:9870"
      - "8020:8020"
    volumes:
      - namenode_data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: nhom19-datanode
    depends_on:
      - namenode
    environment:
      CLUSTER_NAME: demo
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      SERVICE_PRECONDITION: namenode:9870
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/hadoop/dfs/data

  hdfs-init:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: nhom19-hdfs-init
    depends_on:
      - namenode
      - datanode
    entrypoint:
      - /bin/bash
      - -c
      - |
        until hdfs dfs -fs hdfs://namenode:8020 -ls / >/dev/null 2>&1; do
          echo 'Waiting for HDFS...'
          sleep 2
        done
        hdfs dfs -fs hdfs://namenode:8020 -mkdir -p /lake/bronze /lake/bronze/youtube_comments /lake/silver /lake/silver/youtube_comments /lake/gold /lake/gold/youtube_comment_metrics /lake/gold/youtube_sentiment_breakdown /lake_delta/bronze /lake_delta/bronze/youtube_comments /lake_delta/silver /lake_delta/silver/youtube_comments /lake_delta/gold /lake_delta/gold/youtube_comment_metrics /lake_delta/gold/youtube_sentiment_breakdown /checkpoints /checkpoints_delta /user/hive/warehouse
        hdfs dfs -fs hdfs://namenode:8020 -chmod -R 777 /lake /lake_delta /checkpoints /checkpoints_delta
        hdfs dfs -fs hdfs://namenode:8020 -chmod -R 777 /user/hive
        echo 'HDFS init done.'
    restart: "no"

  hive-metastore:
    build:
      context: ./hive
      dockerfile: Dockerfile
    container_name: nhom19-hive-metastore
    depends_on:
      - namenode
      - datanode
      - hdfs-init
    environment:
      SQLSERVER_HOST: ${SQLSERVER_HOST:-host.docker.internal}
      SQLSERVER_PORT: ${SQLSERVER_PORT:-1433}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE:-hive_metastore}
      SQLSERVER_USERNAME: ${SQLSERVER_USERNAME:-sa}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD:-YourStrongPassword123!}
      METASTORE_THRIFT_PORT: ${METASTORE_THRIFT_PORT:-9083}
      METASTORE_WAREHOUSE_DIR: ${METASTORE_WAREHOUSE_DIR:-hdfs://namenode:8020/user/hive/warehouse}
      HADOOP_CONF_DIR: /opt/hadoop-conf
    ports:
      - "9083:9083"
    volumes:
      - ./hadoop/conf:/opt/hadoop-conf:ro
      - ./hive/conf/hive-site.xml.template:/opt/hive/conf/hive-site.xml.template:ro
      - ./hive/scripts/start-metastore.sh:/opt/hive/scripts/start-metastore.sh:ro
    healthcheck:
      test:
        - CMD-SHELL
        - bash -lc "(echo > /dev/tcp/127.0.0.1/9083) >/dev/null 2>&1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  producer:
    image: python:3.11-slim
    container_name: nhom19-producer
    depends_on:
      - kafka
    working_dir: /app
    entrypoint:
      - /bin/bash
      - -c
      - |
        pip install --no-cache-dir -r requirements.txt
        python producer.py
    environment:
      INGESTION_MODE: ${INGESTION_MODE:-sample}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_VIDEO_ID: ${YOUTUBE_VIDEO_ID:-}
      YOUTUBE_ORDER: ${YOUTUBE_ORDER:-time}
      YOUTUBE_MAX_RESULTS: ${YOUTUBE_MAX_RESULTS:-100}
      YOUTUBE_PAGE_LIMIT: ${YOUTUBE_PAGE_LIMIT:-5}
      YOUTUBE_RETRY_DELAY_SECONDS: ${YOUTUBE_RETRY_DELAY_SECONDS:-5}
      YOUTUBE_PUBLISH_DELAY_MS: ${YOUTUBE_PUBLISH_DELAY_MS:-0}
      YOUTUBE_CONTINUOUS_MODE: ${YOUTUBE_CONTINUOUS_MODE:-false}
      YOUTUBE_POLL_INTERVAL_SECONDS: ${YOUTUBE_POLL_INTERVAL_SECONDS:-60}
      YOUTUBE_DEDUP_CACHE_SIZE: ${YOUTUBE_DEDUP_CACHE_SIZE:-5000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: youtube-comments
      SAMPLE_DATA_PATH: /data/sample_comments.jsonl
      REPLAY_DELAY_MS: "300"
      SAMPLE_LOOP: ${SAMPLE_LOOP:-false}
      KAFKA_RETRY_DELAY_SECONDS: "5"
    restart: "no"
    volumes:
      - ./producer:/app
      - ./data:/data:ro

  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-master
    user: "0:0"
    depends_on:
      - kafka
      - namenode
      - hive-metastore
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
    ports:
      - "8081:8080"
      - "17077:7077"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro
      - ./spark/sql:/opt/sql:ro

  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-worker
    user: "0:0"
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
      SPARK_WORKER_DIR: /tmp/spark-work
      PYSPARK_PYTHON: /usr/bin/python3
    ports:
      - "8082:8081"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro

  spark-bronze:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-bronze
    user: "0:0"
    depends_on:
      - spark-master
      - producer
    command:
      - /opt/spark/bin/spark-submit
      - /opt/jobs/bronze_stream.py
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
      PYSPARK_PYTHON: /usr/bin/python3
    volumes:
      - ./spark/jobs:/opt/jobs:ro
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro
    restart: on-failure

  spark-silver:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-silver
    user: "0:0"
    depends_on:
      - spark-master
      - spark-bronze
      - hdfs-init
    command:
      - /opt/spark/bin/spark-submit
      - /opt/jobs/silver_stream.py
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
      PYSPARK_PYTHON: /usr/bin/python3
      SENTIMENT_MODE: ${SENTIMENT_MODE:-transformer}
      SENTIMENT_MODEL_NAME: ${SENTIMENT_MODEL_NAME:-cardiffnlp/twitter-xlm-roberta-base-sentiment-multilingual}
      SENTIMENT_BATCH_SIZE: ${SENTIMENT_BATCH_SIZE:-8}
      SENTIMENT_MAX_LENGTH: ${SENTIMENT_MAX_LENGTH:-256}
      SENTIMENT_FALLBACK_TO_KEYWORD: ${SENTIMENT_FALLBACK_TO_KEYWORD:-true}
    volumes:
      - ./spark/jobs:/opt/jobs:ro
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro
      - hf_cache:/root/.cache/huggingface
    restart: on-failure

  spark-gold:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-gold
    user: "0:0"
    depends_on:
      - spark-master
      - spark-silver
      - hdfs-init
    command:
      - /opt/spark/bin/spark-submit
      - /opt/jobs/gold_stream.py
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
      PYSPARK_PYTHON: /usr/bin/python3
    volumes:
      - ./spark/jobs:/opt/jobs:ro
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro
    restart: on-failure

  spark-thriftserver:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: nhom19-spark-thriftserver
    user: "0:0"
    depends_on:
      - spark-master
      - spark-worker
      - hive-metastore
    command:
      - /bin/bash
      - -lc
      - |
        until bash -c '</dev/tcp/hive-metastore/9083' >/dev/null 2>&1; do
          echo 'Waiting for hive-metastore:9083...'
          sleep 3
        done
        until bash -c '</dev/tcp/spark-master/7077' >/dev/null 2>&1; do
          echo 'Waiting for spark-master:7077...'
          sleep 3
        done
        export SPARK_NO_DAEMONIZE=true
        /opt/spark/sbin/start-thriftserver.sh \
          --master spark://spark-master:7077 \
          --packages io.delta:delta-core_2.12:2.3.0 \
          --conf spark.jars.packages=io.delta:delta-core_2.12:2.3.0 \
          --conf spark.sql.catalogImplementation=hive \
          --conf spark.hadoop.hive.metastore.uris=thrift://host.docker.internal:9083 \
          --conf spark.sql.warehouse.dir=hdfs://namenode:8020/user/hive/warehouse \
          --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension \
          --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
          --conf spark.sql.hive.thriftServer.incrementalCollect=true \
          --hiveconf hive.metastore.uris=thrift://host.docker.internal:9083 \
          --hiveconf hive.server2.thrift.port=10000 \
          --hiveconf hive.server2.thrift.bind.host=0.0.0.0 \
          --hiveconf hive.server2.authentication=NOSASL \
          --hiveconf hive.server2.enable.doAs=false \
          --hiveconf hive.server2.transport.mode=binary \
          --hiveconf hive.server2.thrift.resultset.default.fetch.size=1000
    environment:
      HADOOP_CONF_DIR: /opt/spark/conf/hadoop
      SPARK_LOCAL_DIRS: /tmp/spark-local
      PYSPARK_PYTHON: /usr/bin/python3
    ports:
      - "10000:10000"
      - "4040:4040"
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./hadoop/conf:/opt/spark/conf/hadoop:ro

volumes:
  kafka_data:
  namenode_data:
  datanode_data:
  hf_cache:
